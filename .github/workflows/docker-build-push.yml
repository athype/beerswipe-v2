name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - image: frontend
            context: .
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image settings
        id: image_settings
        shell: bash
        run: |
          if [ -n "${{ vars.DOCKER_REGISTRY }}" ]; then
            echo "registry=${{ vars.DOCKER_REGISTRY }}" >> "$GITHUB_OUTPUT"
          else
            echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ vars.DOCKER_IMAGE_NAMESPACE }}" ]; then
            echo "namespace=${{ vars.DOCKER_IMAGE_NAMESPACE }}" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate custom registry credentials
        if: ${{ steps.image_settings.outputs.registry != 'ghcr.io' }}
        env:
          DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: |
          if [ -z "$DOCKER_REGISTRY_USERNAME" ] || [ -z "$DOCKER_REGISTRY_PASSWORD" ]; then
            echo "DOCKER_REGISTRY_USERNAME and DOCKER_REGISTRY_PASSWORD are required for non-GHCR registries."
            exit 1
          fi

      - name: Log in to GHCR
        if: ${{ steps.image_settings.outputs.registry == 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to custom registry
        if: ${{ steps.image_settings.outputs.registry != 'ghcr.io' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image_settings.outputs.registry }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_settings.outputs.registry }}/${{ steps.image_settings.outputs.namespace }}/beerswipe-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
